<!-- INTRO SCREEN -->
<div class="tsw-screen tsw-active tsw-center" id="tsw-screen-intro">
  <p class="tsw-title">Hand Steadiness Challenge</p>

  <p class="tsw-sub">
    Guide your cursor through the maze without touching the walls.<br>
    3 mistakes and it's over. How far can you get?
  </p>

  <div class="tsw-diff-row">
    <button class="tsw-diff-btn tsw-selected" data-diff="easy">Easy</button>
    <button class="tsw-diff-btn" data-diff="medium">Medium</button>
    <button class="tsw-diff-btn" data-diff="hard">Hard • Surgeon Mode</button>
  </div>

  <div class="tsw-btn-row">
    <button class="tsw-primary" id="tsw-btn-start">▶ Start</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div class="tsw-screen" id="tsw-screen-game">

  <div class="tsw-hud">
    <div class="tsw-hud-item">
      Time
      <span class="tsw-hud-val" id="tsw-hud-time">0.0s</span>
    </div>

    <div class="tsw-hud-item">
      Progress
      <span class="tsw-hud-val" id="tsw-hud-progress">0%</span>
    </div>

    <div class="tsw-hud-item">
      Mistakes
      <span class="tsw-hud-val" id="tsw-hud-errors">0</span>
    </div>
  </div>

  <div class="tsw-progress-wrap">
    <div class="tsw-progress-bar" id="tsw-progress-bar"></div>
  </div>

  <canvas
    id="tsw-maze-canvas"
    width="640"
    height="280"
  ></canvas>

  <p class="tsw-touch-hint">
    Move slowly — any wall contact counts as a mistake (max 3)
  </p>
</div>

<!-- RESULT SCREEN -->
<div class="tsw-screen tsw-center" id="tsw-screen-result">

  <div class="tsw-grade-badge" id="tsw-grade-badge"></div>

  <p class="tsw-title" id="tsw-result-title"></p>

  <p class="tsw-verdict" id="tsw-result-verdict"></p>

  <div class="tsw-stat-grid">

    <div class="tsw-stat">
      <div class="tsw-stat-label">Time</div>
      <div class="tsw-stat-val" id="tsw-result-time">—</div>
    </div>

    <div class="tsw-stat">
      <div class="tsw-stat-label">Mistakes</div>
      <div class="tsw-stat-val" id="tsw-result-errors">—</div>
    </div>

    <div class="tsw-stat">
      <div class="tsw-stat-label">Score</div>
      <div class="tsw-stat-val" id="tsw-result-score">—</div>
    </div>

  </div>

  <div class="tsw-btn-row">
    <button id="tsw-btn-share">↗ Copy Result</button>
    <button class="tsw-primary" id="tsw-btn-retry">↻ Try Again</button>
  </div>

</div>

<script>
(function(){

  const widget = document.getElementById('tsw-handsteadiness-widget');

  const W = 640;
  const H = 280;

  const DIFFICULTIES = {
    easy: {
      pathW: 38,
      label: 'Easy'
    },
    medium: {
      pathW: 24,
      label: 'Medium'
    },
    hard: {
      pathW: 15,
      label: 'Surgeon Mode'
    }
  };

  let diff = 'easy';
  let state = 'idle';

  let startTime = 0;
  let elapsed = 0;
  let mistakes = 0;
  let progress = 0;

  let timerID = null;

  let ballX = 0;
  let ballY = 0;
  let ballR = 6;

  let mazeSegments = [];

  let canvas = null;
  let ctx = null;

  function qs(selector){
    return widget.querySelector(selector);
  }

  function qsa(selector){
    return widget.querySelectorAll(selector);
  }

  function showScreen(screenId){

    qsa('.tsw-screen').forEach(screen => {
      screen.classList.remove('tsw-active');
    });

    qs(screenId).classList.add('tsw-active');
  }

  qsa('.tsw-diff-btn').forEach(btn => {

    btn.addEventListener('click', function(){

      qsa('.tsw-diff-btn').forEach(b => {
        b.classList.remove('tsw-selected');
      });

      btn.classList.add('tsw-selected');

      diff = btn.dataset.diff;

    });

  });

  function buildMaze(pathW){

    const p = pathW;
    const half = p / 2;
    const margin = 16;

    return [
      {
        x1: margin,
        y1: H / 2 - half,
        x2: margin + 60,
        y2: H / 2 + half
      },
      {
        x1: margin + 60,
        y1: margin,
        x2: margin + 60 + p,
        y2: H / 2 + half
      },
      {
        x1: margin + 60,
        y1: margin,
        x2: W / 2,
        y2: margin + p
      },
      {
        x1: W / 2 - half,
        y1: margin,
        x2: W / 2 + half,
        y2: H - margin - p
      },
      {
        x1: W / 2 - half,
        y1: H - margin - p,
        x2: W - margin - 60,
        y2: H - margin
      },
      {
        x1: W - margin - 60 - p,
        y1: H / 2 - half,
        x2: W - margin - 60,
        y2: H - margin
      },
      {
        x1: W - margin - 60 - p,
        y1: H / 2 - half,
        x2: W - margin,
        y2: H / 2 + half
      }
    ];

  }

  function startGame(){

    showScreen('#tsw-screen-game');

    canvas = qs('#tsw-maze-canvas');
    ctx = canvas.getContext('2d');

    const pathW = DIFFICULTIES[diff].pathW;

    mazeSegments = buildMaze(pathW);

    mistakes = 0;
    elapsed = 0;
    progress = 0;

    ballX = 24;
    ballY = H / 2;

    qs('#tsw-hud-time').textContent = '0.0s';
    qs('#tsw-hud-progress').textContent = '0%';
    qs('#tsw-hud-errors').textContent = '0';

    qs('#tsw-progress-bar').style.width = '0%';

    state = 'waiting';

    drawMaze();

    canvas.addEventListener('mousemove', onMove);
    canvas.addEventListener('touchmove', onTouch, { passive:false });
    canvas.addEventListener('touchstart', onTouch, { passive:false });

  }

  function drawMaze(){

    ctx.clearRect(0, 0, W, H);

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);

    const fillCols = [
      '#E1F5EE',
      '#9FE1CB',
      '#5DCAA5',
      '#1D9E75',
      '#0F6E56',
      '#085041',
      '#04342C'
    ];

    const prog = Math.min(progress, 1);

    mazeSegments.forEach((s, i) => {

      const segProg = Math.min(
        1,
        Math.max(
          0,
          (prog * mazeSegments.length) - i
        )
      );

      if(segProg > 0){

        ctx.fillStyle =
          fillCols[Math.min(i, fillCols.length - 1)] + '44';

        ctx.fillRect(
          s.x1 + 1,
          s.y1 + 1,
          (s.x2 - s.x1 - 2) * segProg,
          s.y2 - s.y1 - 2
        );

      }

      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1.5;

      ctx.strokeRect(
        s.x1,
        s.y1,
        s.x2 - s.x1,
        s.y2 - s.y1
      );

    });

    const lastSeg = mazeSegments[mazeSegments.length - 1];

    ctx.fillStyle = '#1D9E75';
    ctx.font = 'bold 11px sans-serif';

    ctx.fillText(
      'FINISH',
      lastSeg.x2 - 48,
      lastSeg.y1 + DIFFICULTIES[diff].pathW / 2 + 4
    );

    ctx.beginPath();

    ctx.arc(
      ballX,
      ballY,
      ballR,
      0,
      Math.PI * 2
    );

    ctx.fillStyle =
      mistakes > 0
      ? '#D85A30'
      : '#185FA5';

    ctx.fill();

  }

  function getCanvasPos(e){

    const rect = canvas.getBoundingClientRect();

    return {
      x: (e.clientX - rect.left) * (W / rect.width),
      y: (e.clientY - rect.top) * (H / rect.height)
    };

  }

  function onMove(e){
    handlePos(getCanvasPos(e));
  }

  function onTouch(e){

    e.preventDefault();

    handlePos(
      getCanvasPos(e.touches[0])
    );

  }

  function handlePos(pos){

    const x = pos.x;
    const y = pos.y;

    if(state === 'waiting'){

      const s = mazeSegments[0];

      if(
        x >= s.x1 &&
        x <= s.x2 &&
        y >= s.y1 &&
        y <= s.y2
      ){

        state = 'playing';

        startTime = Date.now();

        timerID = setInterval(function(){

          if(state !== 'playing'){
            return;
          }

          elapsed =
            (Date.now() - startTime) / 1000;

          qs('#tsw-hud-time').textContent =
            elapsed.toFixed(1) + 's';

        }, 50);

      }

    }

    if(state !== 'playing'){
      return;
    }

    ballX = x;
    ballY = y;

    let inAny = false;
    let bestProg = 0;

    mazeSegments.forEach((s, i) => {

      if(
        x >= s.x1 &&
        x <= s.x2 &&
        y >= s.y1 &&
        y <= s.y2
      ){

        inAny = true;

        const wide =
          (s.x2 - s.x1) >
          (s.y2 - s.y1);

        const segProg = wide
          ? (x - s.x1) / (s.x2 - s.x1)
          : (y - s.y1) / (s.y2 - s.y1);

        const totalProg =
          (i + segProg) / mazeSegments.length;

        if(totalProg > bestProg){
          bestProg = totalProg;
        }

      }

    });

    if(bestProg > progress){
      progress = bestProg;
    }

    if(!inAny){

      mistakes++;

      qs('#tsw-hud-errors').textContent =
        mistakes;

      if(mistakes >= 3){

        endGame(false);

        return;

      }

    }

    const prog = Math.round(progress * 100);

    qs('#tsw-hud-progress').textContent =
      prog + '%';

    qs('#tsw-progress-bar').style.width =
      prog + '%';

    if(progress >= 0.98){

      endGame(true);

      return;

    }

    drawMaze();

  }

  function endGame(success){

    state = 'done';

    clearInterval(timerID);

    canvas.removeEventListener('mousemove', onMove);
    canvas.removeEventListener('touchmove', onTouch);
    canvas.removeEventListener('touchstart', onTouch);

    const t = elapsed.toFixed(1);

    const score = success
      ? Math.max(
          0,
          Math.round(
            100 -
            (mistakes * 20) -
            (elapsed * 1.5)
          )
        )
      : Math.round(progress * 40);

    let grade;
    let title;
    let verdict;
    let bg;
    let tc;

    if(!success && mistakes >= 3){

      grade = 'X';

      title = 'Too shaky!';

      verdict =
        'Your hands betrayed you — 3 mistakes and it’s over. The average person lasts 18 seconds on Medium. Think you can do better?';

      bg = '#FCEBEB';
      tc = '#A32D2D';

    } else if(score >= 85){

      grade = 'S';

      title = 'Surgeon-level control';

      verdict =
        'Less than 5% of people score this high. Your hands are remarkably steady — a cardiothoracic surgeon would be impressed.';

      bg = '#E1F5EE';
      tc = '#085041';

    } else if(score >= 65){

      grade = 'A';

      title = 'Very steady hands';

      verdict =
        'You’re in the top 20%. Clean, controlled movement — you’d pass a basic surgical dexterity test.';

      bg = '#EAF3DE';
      tc = '#27500A';

    } else if(score >= 45){

      grade = 'B';

      title = 'Decent control';

      verdict =
        'Better than average. With practice you could push into the top tier. Retry and aim for zero mistakes.';

      bg = '#E6F1FB';
      tc = '#0C447C';

    } else {

      grade = 'C';

      title = 'Needs work';

      verdict =
        'Your hands are trickier to control than you thought. Most people are surprised. Give it another go.';

      bg = '#FAEEDA';
      tc = '#633806';

    }

    qs('#tsw-grade-badge').textContent = grade;

    qs('#tsw-grade-badge').style.background = bg;
    qs('#tsw-grade-badge').style.color = tc;

    qs('#tsw-result-title').textContent = title;

    qs('#tsw-result-verdict').textContent = verdict;

    qs('#tsw-result-time').textContent =
      t + 's';

    qs('#tsw-result-errors').textContent =
      mistakes;

    qs('#tsw-result-score').textContent =
      score;

    showScreen('#tsw-screen-result');

  }

  qs('#tsw-btn-start').addEventListener(
    'click',
    startGame
  );

  qs('#tsw-btn-retry').addEventListener(
    'click',
    function(){
      showScreen('#tsw-screen-intro');
    }
  );

  qs('#tsw-btn-share').addEventListener(
    'click',
    function(){

      const title =
        qs('#tsw-result-title').textContent;

      const score =
        qs('#tsw-result-score').textContent;

      const time =
        qs('#tsw-result-time').textContent;

      const txt =
        'Hand Steadiness Challenge\n' +
        title + '\n' +
        'Score: ' + score + '\n' +
        'Time: ' + time + '\n' +
        'Mistakes: ' + mistakes + '\n' +
        'Difficulty: ' + DIFFICULTIES[diff].label;

      if(navigator.clipboard){

        navigator.clipboard.writeText(txt)
          .then(function(){

            qs('#tsw-btn-share').textContent =
              'Copied!';

            setTimeout(function(){

              qs('#tsw-btn-share').textContent =
                '↗ Copy Result';

            }, 2000);

          });

      }

    }
  );

})();
</script>

</div>
